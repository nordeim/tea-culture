# CHA YUAN - Docker Compose Configuration
# PostgreSQL 17 + Redis 7.4 - LAN Accessible

services:
  # PostgreSQL 17 - Official image with Singapore locale
  postgres:
    image: postgres:17-trixie
    container_name: chayuan-postgres
    environment:
      POSTGRES_DB: chayuan_db
      POSTGRES_USER: chayuan_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-chayuan_dev_password}
      TZ: Asia/Singapore
      PGDATA: /var/lib/postgresql/data/pgdata
      LANG: en_SG.utf8
      LC_ALL: en_SG.utf8
    command: >
      postgres
      -c timezone=Asia/Singapore
      -c log_destination=stderr
      -c logging_collector=off
      -c log_min_messages=warning
    ports:
      # Explicitly bind to all interfaces for LAN access
      - "0.0.0.0:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chayuan_user"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - chayuan-network
    restart: unless-stopped

  # Redis 7.4 - Official Alpine image
  redis:
    image: redis:7.4-alpine
    container_name: chayuan-redis
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --save 60 1000
      --loglevel warning
    ports:
      # Explicitly bind to all interfaces for LAN access
      - "0.0.0.0:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - chayuan-network
    restart: unless-stopped

  # Backend Django - Development server
  backend:
    build:
      context: ../../backend
      dockerfile: ../infra/docker/Dockerfile.backend.dev
    container_name: chayuan-backend
    environment:
      DJANGO_SETTINGS_MODULE: chayuan.settings.development
      DATABASE_URL: postgres://chayuan_user:${DB_PASSWORD:-chayuan_dev_password}@postgres:5432/chayuan_db
      REDIS_URL: redis://redis:6379/0
      DEBUG: "true"
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-not-for-production}
    ports:
      - "8000:8000"
    volumes:
      - ../../backend:/app
      - backend_static:/app/staticfiles
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - chayuan-network
    restart: unless-stopped
    command: >
      sh -c "python wait_for_db.py &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  # Frontend Next.js - Development server
  frontend:
    build:
      context: ../../frontend
      dockerfile: ../infra/docker/Dockerfile.frontend.dev
    container_name: chayuan-frontend
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    volumes:
      - ../../frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - chayuan-network
    restart: unless-stopped
    command: >
      sh -c "npm install &&
             npm run dev"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_static:
    driver: local

networks:
  chayuan-network:
    driver: bridge
    # IPAM config removed - Docker auto-assigns non-conflicting subnet
