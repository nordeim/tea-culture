# CHA YUAN - Docker Compose Configuration (Development - Minimal)
# PostgreSQL 17 + Redis 7.4 - LAN Accessible

services:
  # PostgreSQL 17 - Official image with Singapore locale
  postgres:
    image: postgres:17-trixie
    container_name: chayuan-postgres
    environment:
      POSTGRES_DB: chayuan_db
      POSTGRES_USER: chayuan_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-chayuan_dev_password}
      TZ: Asia/Singapore
      PGDATA: /var/lib/postgresql/data/pgdata
    command: >
      postgres
      -c lc_collate=en_SG.utf8
      -c lc_ctype=en_SG.utf8
      -c timezone=Asia/Singapore
      -c log_destination=stderr
      -c logging_collector=off
      -c log_min_messages=warning
    ports:
      # Explicitly bind to all interfaces for LAN access
      # Using 5433 to avoid conflict with existing vectordb container
      - "0.0.0.0:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      # Fixed: use correct username 'chayuan_user' not 'chayuan'
      test: ["CMD-SHELL", "pg_isready -U chayuan_user"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - chayuan-network
    restart: unless-stopped

  # Redis 7.4 - Official Alpine image
  redis:
    image: redis:7.4-alpine
    container_name: chayuan-redis
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --save 60 1000
      --loglevel warning
    ports:
      # Explicitly bind to all interfaces for LAN access
      - "0.0.0.0:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - chayuan-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  chayuan-network:
    driver: bridge
    # IPAM config removed - Docker auto-assigns non-conflicting subnet
